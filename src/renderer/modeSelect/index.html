<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatSpark - インプット選択</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ChatSpark</h1>
      <p>配信支援ツール - コメントでOBSオーバーレイを自動表示</p>
    </header>
    <main>
      <h2>インプットを選択</h2>
      <div class="mode-cards">
        <a href="/twitch" class="mode-card">
          <div class="mode-icon">💬</div>
          <div class="mode-name">Twitch</div>
          <div class="mode-desc">Twitch チャット・チャンネルポイントに直接接続</div>
        </a>
        <a href="/mcv" class="mode-card">
          <div class="mode-icon">🔌</div>
          <div class="mode-name">MCV</div>
          <div class="mode-desc">MultiCommentViewer 経由で複数プラットフォームのコメントを受信</div>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
